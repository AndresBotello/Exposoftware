# ============================================================
# Nginx INTERNO del contenedor del frontend
# - Sirve los estáticos del build de Vite
# - SPA fallback para React Router (todo redirige a index.html)
# - Compresión gzip
# - Caché agresivo para assets con hash, no-cache para index.html
# NOTA: El SSL y los security headers principales (HSTS, etc.)
#       se manejan en el Nginx del HOST (capa de afuera).
# ============================================================

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # No exponer la versión de Nginx
    server_tokens off;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ---- index.html: NO cachear (para que los usuarios reciban el nuevo bundle) ----
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # ---- Assets con hash (assets/, /static/, etc.): cache 1 año, inmutable ----
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|gif|webp|avif|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # ---- SPA fallback: cualquier ruta desconocida -> index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Bloquear acceso a archivos sensibles ----
    location ~ /\.(?!well-known) {
        deny all;
    }
}
